name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1, v1.0, v2, v3)

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libimobiledevice-utils idevicerestore usbmuxd libusb-1.0-0-dev python3-dev patchelf ccache

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: Build with Nuitka (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m nuitka --standalone --onefile --enable-plugin=pyqt5 --windows-disable-console --output-filename="iUnlock_Pro_Windows.exe" main.py

    - name: Build with Nuitka (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        python -m nuitka --standalone --onefile --enable-plugin=pyqt5 --output-filename="iUnlock_Pro_Linux" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: |
          *.exe
          iUnlock_Pro_Linux*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build-windows-latest/*.exe
          build-ubuntu-latest/iUnlock_Pro_Linux*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
